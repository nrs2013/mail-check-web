<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mail-Check! Web</title>
<style>
  :root { color-scheme: dark; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", system-ui, sans-serif;
    background: #1a1a1a; color: #d8d8d8;
    margin: 0; padding: 24px; font-size: 14px;
  }
  h1 { color: #d4925a; margin: 0 0 12px; font-size: 22px; }
  .sub { color: #999; margin-bottom: 24px; }
  .status { background: #232323; border: 1px solid #353535; padding: 16px; border-radius: 8px; margin-bottom: 16px; }
  button { background: #d4925a; color: #1a1a1a; border: 0; padding: 10px 20px; border-radius: 6px; font-size: 14px; cursor: pointer; font-weight: 600; }
  button:hover { background: #e8a570; }
  pre { background: #0f0f0f; padding: 12px; border-radius: 6px; overflow: auto; font-size: 12px; }
  ul { line-height: 1.8; }
</style>
</head>
<body>
  <h1>📧 Mail-Check! Web</h1>
  <div class="sub">Gmail仕分けダッシュボード（独立Web版・Gemini AI）</div>

  <div class="status">
    <strong>🚧 開発中（スケルトン）</strong><br>
    現在はAPI動作確認のみ。これから順次実装：
    <ul>
      <li>Google でログイン（Gmail OAuth）</li>
      <li>メール一覧・自分宛フィルタ</li>
      <li>AI要約（Gemini無料枠で動く）</li>
      <li>PIC UP! 案件サマリー</li>
    </ul>
  </div>

  <div class="status">
    <strong>🤖 Gemini API テスト</strong><br>
    <button id="test-ai">Gemini を呼んでみる</button>
    <pre id="result">結果はここに表示</pre>
  </div>

<script>
document.getElementById("test-ai").addEventListener("click", async () => {
  const out = document.getElementById("result");
  out.textContent = "呼び出し中...";
  const t0 = Date.now();
  try {
    const r = await fetch("/api/ai", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt: "日本語で「こんにちは」と一言だけ返してください。それ以外の文字は不要。" })
    });
    const data = await r.json();
    const dt = Date.now() - t0;
    out.textContent = "(" + dt + "ms)\n" + JSON.stringify(data, null, 2);
  } catch (e) {
    out.textContent = "Error: " + e.message;
  }
});
</script>
</body>
</html>
