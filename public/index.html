<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mail-Check! Web</title>
<style>
  :root {
    --bg: #1a1a1a; --bg-elev: #232323; --border: #353535;
    --text: #d8d8d8; --text-2: #999; --accent: #d4925a;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    margin: 0; padding: 24px; font-size: 14px;
  }
  h1 { color: var(--accent); margin: 0 0 12px; font-size: 22px; }
  .sub { color: var(--text-2); margin-bottom: 24px; }
  .status { background: var(--bg-elev); border: 1px solid var(--border); padding: 16px; border-radius: 8px; margin-bottom: 16px; }
  button { background: var(--accent); color: #1a1a1a; border: 0; padding: 10px 20px; border-radius: 6px; font-size: 14px; cursor: pointer; font-weight: 600; }
  button:hover { background: #e8a570; }
  pre { background: #0f0f0f; padding: 12px; border-radius: 6px; overflow: auto; font-size: 12px; }
</style>
</head>
<body>
  <h1>📧 Mail-Check! Web</h1>
  <div class="sub">Gmail 仕分けダッシュボード（独立Webアプリ版）</div>

  <div class="status">
    <strong>🚧 開発中</strong><br>
    現在はスケルトン状態。これから順次以下を実装していきます：
    <ul>
      <li>Google でログイン（Gmail OAuth）</li>
      <li>メール一覧・フィルタリング</li>
      <li>AI要約（Claude API 経由）</li>
      <li>PIC UP! 案件サマリー</li>
    </ul>
  </div>

  <div class="status">
    <strong>API テスト</strong><br>
    <button id="test-claude">Claude API を叩いてみる</button>
    <pre id="result">結果はここに表示</pre>
  </div>

<script>
document.getElementById("test-claude").addEventListener("click", async () => {
  const out = document.getElementById("result");
  out.textContent = "呼び出し中...";
  try {
    const r = await fetch("/api/claude", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt: "Say hello in Japanese, just one word." })
    });
    const data = await r.json();
    out.textContent = JSON.stringify(data, null, 2);
  } catch (e) {
    out.textContent = "Error: " + e.message;
  }
});
</script>
</body>
</html>
